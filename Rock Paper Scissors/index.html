<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Game</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Rock-Paper-Scissors</h1>
    <div class="choices">
        <button onclick="play('rock')">✊</button>
        <button onclick="play('paper')">✋</button>
        <button onclick="play('scissors')">✌️</button>
    </div>
    <div class="chosen" id="playerChoice">
        Player:
    </div>
    <div class="chosen" id="computerChoice">
        Computer:
    </div>
    <div id="result">

    </div>
    <div class="score" id="playerScore">Player Score: 0</div>
    <div class="score" id="computerScore">Computer Score: 0</div>
    <div id="tries">Plays: 0</div>
    <script src="index.js"></script>
</body>

</html>
