<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temp Convertor</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="container">
        <h1>Temperature Convertor</h1>
        <div id="input"><input id="Temp" type="number" placeholder="0"></div>
        <div id="checkbox">
            <input type="checkbox" name="To Celsius" id="ToCelsius">
            <label for="To Celsius">Fahrenheit to Celsius</label>
            <br>
            <input type="checkbox" name="To Fahrenheit" id="ToFahrenheit">
            <label for="To Fahrenheit">Celsius to Fahrenheit</label>
            <br>
        </div>
        <button id="submit" type="submit">Submit</button>
        <h1 id="result"></h1>
    </div>
    <script src="index.js"></script>
</body>

</html>
